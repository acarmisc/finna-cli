openapi: 3.0.3
info:
  title: Finna FinOps API
  version: 0.7.0
  description: 'The Finna FinOps API is the backend for the Finna cloud cost management platform. It handles multi-cloud cost
    ingestion (Azure Cost Management, GCP Billing, LLM usage), resource wastage detection, alert management, and per-project
    FinOps dashboards. Extracted cost records are normalised into a unified schema and made available through a rich query
    layer with time-window shortcuts (`mtd`, `7d`, `30d`, `90d`), provider filters, and CSV export.


    Authentication supports three flows: username/password JWT (primary), GitHub OAuth (developer login), and pluggable OIDC
    providers with PKCE and auto-provisioning. All resource endpoints require a valid JWT Bearer token. Admin-only endpoints
    (auth provider CRUD) require an `is_admin` claim in the token.


    This repository contains the API-only backend. The React/TypeScript UI lives in a separate repo and communicates exclusively
    through this API.'
  contact:
    name: Finna Team
    email: andrea.carmisciano@abstract.it
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
paths:
  /health:
    get:
      summary: Basic liveness check
      description: 'Returns `{"status": "ok"}` with a timestamp. Use for simple uptime monitoring; no database check is performed.'
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
      tags:
      - Health
  /healthz:
    get:
      summary: Kubernetes-style liveness probe
      description: Returns API name and a mocked database status. Intended for k8s liveness probes.
      operationId: healthz_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Healthz Healthz Get
      tags:
      - Health
  /api/v1/health:
    get:
      summary: Extended health check with database probe
      description: Runs a `SELECT 1` against the database and returns `200 OK` if healthy or `503` if the database is unreachable.
        Suitable for readiness probes.
      operationId: api_health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      tags:
      - Health
  /api/v1/db/stats:
    get:
      summary: Database connection pool statistics
      description: Returns current connection pool metrics (pool size, idle/busy connections). Useful for operational monitoring;
        requires no authentication.
      operationId: db_stats_api_v1_db_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      tags:
      - Health
  /api/v1/config:
    get:
      tags:
      - Config
      summary: List cloud credential configs
      operationId: list_configs_api_v1_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CloudConfigResponse'
                type: array
                title: Response List Configs Api V1 Config Get
      security:
      - OAuth2PasswordBearer: []
      description: Returns all cloud provider credential configurations. Sensitive fields (`client_secret`, `key_file_content`)
        are redacted. Configs are decrypted from storage before masking.
    post:
      tags:
      - Config
      summary: Create cloud credential config
      operationId: create_config_api_v1_config_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudConfigCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
      description: Stores a new cloud credential entry (provider, credential type, config blob) encrypted at rest. Returns
        the created record with secrets masked.
  /api/v1/config/projects:
    get:
      tags:
      - Config
      summary: List projects with MTD cost
      description: Returns all `fin_projects` entries joined with cost records for the requested time window. The `mtd` field
        is the sum of costs in the period, defaulting to month-to-date.
      operationId: list_projects_api_v1_config_projects_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: window
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: 'Time window: mtd, 7d, 30d, 90d'
          title: Window
        description: 'Time window: mtd, 7d, 30d, 90d'
      - name: start_date
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: Start date in ISO format
          title: Start Date
        description: Start date in ISO format
      - name: end_date
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: End date in ISO format
          title: End Date
        description: End date in ISO format
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
                title: Response List Projects Api V1 Config Projects Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Config
      summary: Create project
      description: Creates a new FinOps project entry. Slug is auto-derived from the name if not provided. Used to track cost
        centre attribution.
      operationId: create_project_api_v1_config_projects_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Data
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Project Api V1 Config Projects Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/config/projects/{slug}:
    get:
      tags:
      - Config
      summary: Get project by slug
      description: Fetches a single project by its slug, joined with cost records for the requested window.
      operationId: get_project_api_v1_config_projects__slug__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      - name: window
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: 'Time window: mtd, 7d, 30d, 90d'
          title: Window
        description: 'Time window: mtd, 7d, 30d, 90d'
      - name: start_date
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: Start date in ISO format
          title: Start Date
        description: Start date in ISO format
      - name: end_date
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: End date in ISO format
          title: End Date
        description: End date in ISO format
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Project Api V1 Config Projects  Slug  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Config
      summary: Delete project
      description: Removes a project entry by slug. Cost records referencing this project's slug are not deleted.
      operationId: delete_project_api_v1_config_projects__slug__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/config/{config_id}/test:
    post:
      tags:
      - Config
      summary: Test cloud credentials
      description: Verifies that the stored credentials can authenticate and access the cloud API. For Azure, performs a Cost
        Management query against the configured subscription scope. For GCP, refreshes ADC credentials.
      operationId: test_config_api_v1_config__config_id__test_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Test Config Api V1 Config  Config Id  Test Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/config/{config_id}:
    get:
      tags:
      - Config
      summary: Get cloud credential config by ID
      operationId: get_config_api_v1_config__config_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Fetches a single credential config. Provider-specific fields (`tenant_id`, `subscription_id`, `project_id`)
        are surfaced as top-level response fields for convenience.
    put:
      tags:
      - Config
      summary: Update cloud credential config
      operationId: update_config_api_v1_config__config_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudConfigUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Partial update of name, credential type, or config blob. Config changes are re-encrypted. Returns the updated
        record.
    delete:
      tags:
      - Config
      summary: Delete cloud credential config
      operationId: delete_config_api_v1_config__config_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Removes the credential config. Does not cascade to associated extractors.
  /api/v1/configs:
    get:
      tags:
      - Config
      summary: CLI-compatible config list
      description: Alias of `GET /config` returning a paginated wrapper object (`data`, `total`, `page`). Intended for the
        Finna CLI tool.
      operationId: cli_config_list_api_v1_configs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Cli Config List Api V1 Configs Get
      security:
      - OAuth2PasswordBearer: []
    post:
      tags:
      - Config
      summary: CLI-compatible config create
      description: Simplified config create for the CLI. Accepts `provider`, `service_category`, `region`, and `cloud_config`
        fields.
      operationId: cli_configs_create_api_v1_configs_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_ConfigCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Cli Configs Create Api V1 Configs Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/configs/{config_id}:
    get:
      tags:
      - Config
      summary: CLI-compatible config get
      description: Alias of `GET /config/{config_id}` returning a flat object with `service_category` and `region` fields.
      operationId: cli_config_get_api_v1_configs__config_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Cli Config Get Api V1 Configs  Config Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Config
      summary: CLI-compatible config update
      description: Simplified config update for the CLI.
      operationId: cli_configs_update_api_v1_configs__config_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_ConfigCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Cli Configs Update Api V1 Configs  Config Id  Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Config
      summary: CLI-compatible config delete
      description: Deletes a config entry. Returns 404 if not found.
      operationId: cli_configs_delete_api_v1_configs__config_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: config_id
        in: path
        required: true
        schema:
          type: string
          title: Config Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/extractors:
    get:
      tags:
      - Extractors
      summary: List extractor registry
      description: Returns registered extractors joined with their associated cloud credential config name. Supports provider
        filtering and pagination.
      operationId: list_extractors_api_v1_extractors_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: provider
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Provider
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Page Size
      responses:
        '200':
          description: Extractor list
          content:
            application/json:
              example:
                data:
                - id: e1
                  name: Azure Billing
                  provider: azure
                  config_id: cfg-1
                  config_name: My Azure SP
                  enabled: true
                  schedule: 0 2 * * *
                  last_run: '2026-06-07T02:00:00'
                  status: idle
                count: 1
                total: 1
                page: 1
                page_size: 50
                has_next: false
                has_prev: false
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Extractors
      summary: Register new extractor
      description: Creates a new extractor registry entry linking a provider, a cloud credential config, and a cron schedule.
      operationId: create_extractor_api_v1_extractors_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Data
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Extractor Api V1 Extractors Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/extractors/runs:
    get:
      tags:
      - Extractors
      summary: List extractor runs
      description: Returns recent extractor run records, optionally filtered by provider. Includes status, log output length,
        and timestamps.
      operationId: list_extractor_runs_api_v1_extractors_runs_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: provider
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Extractor Runs Api V1 Extractors Runs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/extractors/runs/{run_id}:
    get:
      tags:
      - Extractors
      summary: Get extractor run status
      description: Fetches the current status and metadata of a specific run. Returns 404 if the run ID is unknown.
      operationId: get_extractor_run_api_v1_extractors_runs__run_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Extractor Run Api V1 Extractors Runs  Run Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/extractors/runs/{run_id}/cancel:
    post:
      tags:
      - Extractors
      summary: Cancel extractor run
      description: Attempts to cancel an in-progress run. Returns 404 if the run is not found or has already finished.
      operationId: cancel_extractor_run_api_v1_extractors_runs__run_id__cancel_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Cancel Extractor Run Api V1 Extractors Runs  Run Id  Cancel Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/extractors/runs/{run_id}/logs:
    get:
      tags:
      - Extractors
      summary: Get extractor run logs
      description: Returns the sanitised log output for a run as an array of lines. Useful for debugging extraction failures.
      operationId: get_extractor_run_logs_api_v1_extractors_runs__run_id__logs_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Extractor Run Logs Api V1 Extractors Runs  Run Id  Logs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/extractors/run:
    post:
      tags:
      - Extractors
      summary: Trigger extractor run (legacy)
      description: Legacy endpoint that starts an extractor run by `config_id`. Prefer the registry-based flow. Requires `config_id`
        in the request body.
      operationId: run_extractor_via_post_api_v1_extractors_run_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Data
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Run Extractor Via Post Api V1 Extractors Run Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/extractors/{extractor_id}:
    get:
      tags:
      - Extractors
      summary: Get extractor by ID
      description: Fetches a single extractor registry entry. Returns 404 if not found.
      operationId: get_extractor_api_v1_extractors__extractor_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: extractor_id
        in: path
        required: true
        schema:
          type: string
          title: Extractor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Extractor Api V1 Extractors  Extractor Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Extractors
      summary: Delete extractor
      description: Removes the extractor from the registry. In-flight runs are not affected.
      operationId: delete_extractor_api_v1_extractors__extractor_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: extractor_id
        in: path
        required: true
        schema:
          type: string
          title: Extractor Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token:
    post:
      tags:
      - Auth
      summary: Authenticate and obtain JWT
      description: Validates username and bcrypt-hashed password against `auth_users`. Returns a signed JWT Bearer token on
        success. Rate-limited to prevent brute force.
      operationId: login_token_api_v1_auth_token_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Login Token Api V1 Auth Token Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-examples:
        application/json:
          summary: Successful login
          value:
            token: eyJhbGciOiJIUzI1NiJ9...
  /api/v1/auth/github:
    get:
      tags:
      - Auth
      summary: Get GitHub OAuth redirect URL
      description: 'Returns the GitHub authorization URL to redirect the user to. Requires `GITHUB_CLIENT_ID` to be configured;
        returns `{"url": null}` otherwise.'
      operationId: github_redirect_api_v1_auth_github_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Github Redirect Api V1 Auth Github Get
  /api/v1/auth/github/callback:
    post:
      tags:
      - Auth
      summary: Exchange GitHub OAuth code for JWT
