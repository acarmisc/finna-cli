version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - ineffassign
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Writer).Write
    revive:
      rules:
        - name: exported
          disabled: false
          arguments:
            - disableStutteringCheck
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive
      - path: internal/api/openapi/.*
        linters:
          - errcheck
          - govet
          - staticcheck
          - revive
          - ineffassign
          - unused
