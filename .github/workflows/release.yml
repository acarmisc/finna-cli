name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create GitHub release
  packages: write        # push to GHCR if needed
  id-token: write        # cosign keyless OIDC signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so goreleaser can generate changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Install cosign for keyless signing of the checksum file.
      - uses: sigstore/cosign-installer@v3

      # Install syft so goreleaser can generate SBOMs for each archive.
      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
